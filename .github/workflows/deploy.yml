name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      site:
        description: 'Site to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - blazesportsintel
          - blazecraft

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '20'

concurrency:
  group: cloudflare-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      blazesportsintel: ${{ steps.changes.outputs.blazesportsintel }}
      blazecraft: ${{ steps.changes.outputs.blazecraft }}
      blazecraft_exists: ${{ steps.changes.outputs.blazecraft_exists }}
      worker: ${{ steps.changes.outputs.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        env:
          INPUT_SITE: ${{ inputs.site }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -f "games/blazecraft/package.json" ]; then
            echo "blazecraft_exists=true" >> $GITHUB_OUTPUT
          else
            echo "blazecraft_exists=false" >> $GITHUB_OUTPUT
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$INPUT_SITE" = "all" ] || [ "$INPUT_SITE" = "blazesportsintel" ]; then
              echo "blazesportsintel=true" >> $GITHUB_OUTPUT
            else
              echo "blazesportsintel=false" >> $GITHUB_OUTPUT
            fi
            if [ "$INPUT_SITE" = "all" ] || [ "$INPUT_SITE" = "blazecraft" ]; then
              echo "blazecraft=true" >> $GITHUB_OUTPUT
            else
              echo "blazecraft=false" >> $GITHUB_OUTPUT
            fi
            # Worker always deploys on manual dispatch of 'all' or 'blazesportsintel'
            if [ "$INPUT_SITE" = "all" ] || [ "$INPUT_SITE" = "blazesportsintel" ]; then
              echo "worker=true" >> $GITHUB_OUTPUT
            else
              echo "worker=false" >> $GITHUB_OUTPUT
            fi
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

            if echo "$CHANGED_FILES" | grep -qE "^(app|components|functions|hooks|lib|public|src|styles)/|^package\\.json|^pnpm-lock\\.yaml|^wrangler\\.toml|^next\\.config\\.|^tailwind\\.config\\.|^tsconfig\\.json"; then
              echo "blazesportsintel=true" >> $GITHUB_OUTPUT
            else
              echo "blazesportsintel=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED_FILES" | grep -q "^games/blazecraft/"; then
              echo "blazecraft=true" >> $GITHUB_OUTPUT
            else
              echo "blazecraft=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED_FILES" | grep -qE "^workers/"; then
              echo "worker=true" >> $GITHUB_OUTPUT
            else
              echo "worker=false" >> $GITHUB_OUTPUT
            fi
          fi

  deploy-blazesportsintel:
    name: Deploy BlazeSportsIntel
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.blazesportsintel == 'true' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm vitest run

      - name: Build project
        run: pnpm build

      - name: Copy lib to output
        run: cp -r lib out/lib

      - name: Remove RSC payload files (stay under 20k file limit)
        run: find out -name "__next.*" -delete

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=blazesportsintel --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Write deployment record
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          record = {
            "repo": os.environ["GITHUB_REPOSITORY"],
            "sha": os.environ["GITHUB_SHA"],
            "ref": os.environ["GITHUB_REF_NAME"],
            "target_id": "blazesportsintel",
            "target_type": "pages",
            "target_name": "blazesportsintel",
            "environment": "production",
            "status": "success",
            "deployed_at": datetime.now(timezone.utc).isoformat(),
            "workflow_run_id": os.environ["GITHUB_RUN_ID"],
          }
          Path("cloudflare-deploy-record-blazesportsintel.json").write_text(json.dumps(record, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-record-blazesportsintel
          path: cloudflare-deploy-record-blazesportsintel.json

      - name: Wait for propagation
        if: github.ref == 'refs/heads/main'
        run: sleep 30

      - name: Verify API Health
        if: github.ref == 'refs/heads/main'
        run: |
          HEALTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://blazesportsintel.com/api/health" || echo "000")
          if [ "$HEALTH_CODE" = "200" ]; then
            echo "API Health: Healthy"
          else
            echo "API Health check returned: $HEALTH_CODE"
          fi
        continue-on-error: true

  deploy-blazecraft:
    name: Deploy BlazeCraft
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.blazecraft_exists == 'true' &&
      (needs.detect-changes.outputs.blazecraft == 'true' || github.event_name == 'pull_request')
    defaults:
      run:
        working-directory: games/blazecraft
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Build project
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: games/blazecraft
          command: pages deploy dist --project-name=blazecraft --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Write deployment record
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          record = {
            "repo": os.environ["GITHUB_REPOSITORY"],
            "sha": os.environ["GITHUB_SHA"],
            "ref": os.environ["GITHUB_REF_NAME"],
            "target_id": "blazecraft",
            "target_type": "pages",
            "target_name": "blazecraft",
            "environment": "production",
            "status": "success",
            "deployed_at": datetime.now(timezone.utc).isoformat(),
            "workflow_run_id": os.environ["GITHUB_RUN_ID"],
          }
          Path("cloudflare-deploy-record-blazecraft.json").write_text(json.dumps(record, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-record-blazecraft
          path: cloudflare-deploy-record-blazecraft.json

  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.worker == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
      )
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Deploy Worker to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy --env production

      - name: Write deployment record
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          record = {
            "repo": os.environ["GITHUB_REPOSITORY"],
            "sha": os.environ["GITHUB_SHA"],
            "ref": os.environ["GITHUB_REF_NAME"],
            "target_id": "blazesportsintel-worker-prod",
            "target_type": "worker",
            "target_name": "blazesportsintel-worker-prod",
            "environment": "production",
            "status": "success",
            "deployed_at": datetime.now(timezone.utc).isoformat(),
            "workflow_run_id": os.environ["GITHUB_RUN_ID"],
          }
          Path("cloudflare-deploy-record-worker.json").write_text(json.dumps(record, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-deploy-record-worker
          path: cloudflare-deploy-record-worker.json

  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-blazesportsintel, deploy-blazecraft, deploy-worker]
    if: always()
    steps:
      - name: Summary
        env:
          BSI_RESULT: ${{ needs.deploy-blazesportsintel.result }}
          BC_RESULT: ${{ needs.deploy-blazecraft.result }}
          WKR_RESULT: ${{ needs.deploy-worker.result }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "# Cloudflare Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| BlazeSportsIntel | $BSI_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| BlazeCraft | $BC_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | $WKR_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** $ACTOR" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $COMMIT_SHA" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(TZ='America/Chicago' date '+%Y-%m-%d %H:%M:%S CT')" >> $GITHUB_STEP_SUMMARY
