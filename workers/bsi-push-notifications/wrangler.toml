name = "bsi-push-notifications"
main = "index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

routes = [
  { pattern = "blazesportsintel.com/api/push/*", zone_name = "blazesportsintel.com" },
  { pattern = "www.blazesportsintel.com/api/push/*", zone_name = "blazesportsintel.com" }
]

[triggers]
crons = ["*/5 14-5 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "bsi-prod-db"
database_id = "6921617f-5351-4df3-aeab-07425e72ec6b"

[[kv_namespaces]]
binding = "BSI_KEYS"
id = "b7ff9178798d4a238afff79522f651e8"
preview_id = "b7ff9178798d4a238afff79522f651e8"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "f5601b09f5184739b4792b86fb73151b"
preview_id = "f5601b09f5184739b4792b86fb73151b"

[[kv_namespaces]]
binding = "BSI_PROD_CACHE"
id = "e6cb68e815cd45babeee0e10460dbfee"
preview_id = "e6cb68e815cd45babeee0e10460dbfee"

[[tail_consumers]]
service = "bsi-error-tracker"
