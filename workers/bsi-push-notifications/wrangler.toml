name = "bsi-push-notifications-dev"
main = "index.ts"
compatibility_date = "2026-03-24"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "BSI_PROD_DB"
database_name = "bsi-prod-db"
database_id = "6921617f-5351-4df3-aeab-07425e72ec6b"

# TODO: Replace placeholder IDs with real KV namespace IDs from Cloudflare dashboard
# before first deploy. `wrangler deploy` will fail with "namespace not found" otherwise.
[[kv_namespaces]]
binding = "BSI_KEYS"
id = "placeholder"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder"

[[kv_namespaces]]
binding = "BSI_PROD_CACHE"
id = "placeholder"

[env.production]
name = "bsi-push-notifications"
# Routes intentionally omitted — the apex worker (blazesportsintel-worker-prod)
# handles all blazesportsintel.com/* traffic. Push endpoints should be registered
# as Hono handlers in the main worker, or proxied via service binding.
# Adding zone routes here would conflict with the apex worker's catch-all.

[[env.production.d1_databases]]
binding = "BSI_PROD_DB"
database_name = "bsi-prod-db"
database_id = "6921617f-5351-4df3-aeab-07425e72ec6b"

[[env.production.kv_namespaces]]
binding = "BSI_KEYS"
id = "placeholder"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "placeholder"

[[env.production.kv_namespaces]]
binding = "BSI_PROD_CACHE"
id = "placeholder"
