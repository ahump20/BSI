# BSI Push Notifications — Cron Worker
# Sends push notifications for live game events via Expo Push API.
#
# Deploy: wrangler deploy --config workers/bsi-push-notifications/wrangler.toml
# Secrets: wrangler secret put EXPO_ACCESS_TOKEN --config workers/bsi-push-notifications/wrangler.toml

name = "bsi-push-notifications"
main = "index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "blazesportsintel.com/api/push/*", zone_name = "blazesportsintel.com" },
  { pattern = "www.blazesportsintel.com/api/push/*", zone_name = "blazesportsintel.com" }
]

[observability]
enabled = true

[triggers]
crons = ["*/5 14-5 * * *"]

# D1 — bound as both DB and BSI_PROD_DB because the source code references both.
# TODO: unify to a single binding name in a future refactor.
[[d1_databases]]
binding = "DB"
database_name = "bsi-prod-db"
database_id = "6921617f-5351-4df3-aeab-07425e72ec6b"
