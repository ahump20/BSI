name = "blaze-field-site"
main = "index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "blaze-field-assets"

[[kv_namespaces]]
binding = "MONITOR_KV"
id = "eb5a89bcb6034c97831b358b1a8b2eba"

[[kv_namespaces]]
binding = "ERROR_LOG"
id = "7edf894ff9ba4dd08b5433ed76ebc9c6"

[[tail_consumers]]
service = "bsi-error-tracker"

[dev]
port = 8791
local_protocol = "http"

# Production: wrangler deploy --env production
[env.production]
name = "blaze-field-site-prod"
routes = [
  { pattern = "blazecraft.app/*", zone_name = "blazecraft.app" },
]

[env.production.observability]
enabled = true

[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "blaze-field-assets"

[[env.production.kv_namespaces]]
binding = "MONITOR_KV"
id = "eb5a89bcb6034c97831b358b1a8b2eba"

[[env.production.kv_namespaces]]
binding = "ERROR_LOG"
id = "7edf894ff9ba4dd08b5433ed76ebc9c6"
