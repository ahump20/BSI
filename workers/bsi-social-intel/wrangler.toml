# BSI Social Intel — Cron Pipeline Worker
# Ingests Reddit r/collegebaseball + Twitter/X posts, classifies with Claude,
# stores structured signals in D1 + KV for surfacing on blazesportsintel.com.
#
# Deploy: wrangler deploy --config workers/bsi-social-intel/wrangler.toml
# Secrets:
#   wrangler secret put RAPIDAPI_KEY --config workers/bsi-social-intel/wrangler.toml
#   wrangler secret put ANTHROPIC_API_KEY --config workers/bsi-social-intel/wrangler.toml

name = "bsi-social-intel"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[tail_consumers]]
service = "bsi-error-tracker"

# Run every 30 minutes — social signal cadence matches portal-sync
[triggers]
crons = ["*/30 * * * *"]

[[kv_namespaces]]
binding = "KV"
id = "e6cb68e815cd45babeee0e10460dbfee"
preview_id = "e6cb68e815cd45babeee0e10460dbfee"

[[d1_databases]]
binding = "DB"
database_name = "bsi-prod-db"
database_id = "6921617f-5351-4df3-aeab-07425e72ec6b"

# RAPIDAPI_KEY — Twitter/X search via RapidAPI (set via wrangler secret put)
# ANTHROPIC_API_KEY — Claude API for signal classification (set via wrangler secret put)

[dev]
port = 8793
