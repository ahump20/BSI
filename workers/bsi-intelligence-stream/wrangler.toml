# BSI Intelligence Stream — Streaming AI analysis via SSE
# Deploy: wrangler deploy --config workers/bsi-intelligence-stream/wrangler.toml
# Secrets: wrangler secret put ANTHROPIC_API_KEY --config workers/bsi-intelligence-stream/wrangler.toml

name = "bsi-intelligence-stream"
main = "index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[[kv_namespaces]]
binding = "BSI_AI_CACHE"
id = "e5b7cbfb4cc548ca80ec486bff78bfeb"

[[kv_namespaces]]
binding = "BSI_KEYS"
id = "b7ff9178798d4a238afff79522f651e8"

[[routes]]
pattern = "blazesportsintel.com/api/intelligence/*"
zone_name = "blazesportsintel.com"

[[tail_consumers]]
service = "bsi-error-tracker"

[dev]
port = 8793
