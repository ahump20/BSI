<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a1a" />
    <meta name="description" content="Sandlot Sluggers - Step up to the plate in this arcade baseball game." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a1a'/%3E%3Ccircle cx='16' cy='16' r='9' fill='%23BF5700'/%3E%3Cpath d='M12 11c1.5 1 2.5 2.2 3 3.7M20 11c-1.5 1-2.5 2.2-3 3.7M12 21c1.5-1 2.5-2.2 3-3.7M20 21c-1.5-1-2.5-2.2-3-3.7' stroke='%23FFD700' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E" />
    <title>Sandlot Sluggers | Blaze Sports Intel</title>
    
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Oswald','Segoe UI',system-ui,-apple-system,sans-serif;color:#e0e0e0}
      #game-container{width:100%;height:100%;position:relative}
      #game-canvas{width:100%;height:100%;display:block;touch-action:none}

      /* Loading */
      #loading-screen{position:absolute;inset:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
      #loading-screen.hidden{opacity:0;pointer-events:none}
      .loading-title{font-size:42px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#ffd700,#FF6B35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;filter:drop-shadow(0 2px 8px rgba(255,107,53,.15))}
      .loading-subtitle{color:rgba(255,255,255,.4);font-size:11px;margin-bottom:36px;letter-spacing:3px;text-transform:uppercase}

      /* Progress bar replaces spinner */
      .loading-progress{width:240px;height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden;margin-bottom:14px;position:relative}
      .loading-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#BF5700,#FFD700);width:0%;transition:width .4s cubic-bezier(.4,0,.2,1);position:relative}
      .loading-progress-fill::after{content:'';position:absolute;right:0;top:-1px;bottom:-1px;width:20px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3));border-radius:2px}
      .loading-stage{font-size:10px;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase;min-height:14px;transition:opacity .2s}

      /* Spinner fallback for quick loads (roster fetch etc.) */
      .loading-spinner{width:40px;height:40px;border:3px solid rgba(255,215,0,.15);border-top-color:#ffd700;border-radius:50%;animation:spin .8s linear infinite;display:none}
      #loading-screen.loading-screen-minimal .loading-progress{display:none}
      #loading-screen.loading-screen-minimal .loading-stage{display:none}
      #loading-screen.loading-screen-minimal .loading-spinner{display:block}
      @keyframes spin{to{transform:rotate(360deg)}}

      /* Mode Select Overlay */
      #mode-select{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,26,.96) 0%,rgba(20,12,5,.94) 50%,rgba(191,87,0,.1) 100%);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .4s;overflow-y:auto;padding:24px 16px}
      #mode-select::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 40% at 50% 20%, rgba(191,87,0,.08) 0%, transparent 70%);pointer-events:none}
      #mode-select.hidden{opacity:0;pointer-events:none}
      .mode-title{font-family:'Oswald',sans-serif;font-size:52px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#ffd700 0%,#FF6B35 50%,#BF5700 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;text-transform:uppercase;filter:drop-shadow(0 2px 12px rgba(255,107,53,.15))}
      .mode-sub{color:rgba(255,255,255,.35);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px;font-family:'Oswald',sans-serif}

      /* Mode button base */
      .mode-btn{font-family:'Oswald',sans-serif;width:280px;padding:16px 0;margin:8px 0;border:2px solid rgba(191,87,0,.35);border-radius:12px;background:rgba(191,87,0,.08);color:#ffd700;font-size:17px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.5px;text-transform:uppercase}
      .mode-btn:hover{background:rgba(255,215,0,.12);border-color:#ffd700;transform:translateY(-2px);box-shadow:0 8px 24px rgba(191,87,0,.15)}
      .mode-desc{font-size:12px;color:rgba(255,255,255,.3);margin-top:3px;font-weight:400;letter-spacing:.3px;font-family:'Cormorant Garamond','Georgia',serif}

      /* Mode card grid */
      .mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:92%;max-width:520px}
      .mode-grid .mode-btn{width:auto;margin:0;padding:24px 12px 18px;font-size:15px;position:relative;overflow:hidden}
      .mode-grid .mode-btn::before{display:block;font-size:28px;margin-bottom:8px;opacity:.6;transition:all .3s;font-style:normal;line-height:1}
      .mode-grid .mode-btn:hover::before{opacity:1;transform:scale(1.15)}

      /* Mode-specific icons + accent colors */
      .mode-grid .mode-btn[data-mode="practice"]{border-color:rgba(85,187,255,.2)}
      .mode-grid .mode-btn[data-mode="practice"]::before{content:'\26BE';color:#55bbff}
      .mode-grid .mode-btn[data-mode="practice"]:hover{border-color:rgba(85,187,255,.5);background:rgba(85,187,255,.08);box-shadow:0 8px 24px rgba(85,187,255,.1)}

      .mode-grid .mode-btn[data-mode="quickPlay"]{border-color:rgba(255,107,53,.2)}
      .mode-grid .mode-btn[data-mode="quickPlay"]::before{content:'\25B6';color:#ff6b35}
      .mode-grid .mode-btn[data-mode="quickPlay"]:hover{border-color:rgba(255,107,53,.5);background:rgba(255,107,53,.08);box-shadow:0 8px 24px rgba(255,107,53,.1)}

      .mode-grid .mode-btn[data-mode="hrDerby"]{border-color:rgba(255,68,68,.2)}
      .mode-grid .mode-btn[data-mode="hrDerby"]::before{content:'\1F4A5';color:#ff4444}
      .mode-grid .mode-btn[data-mode="hrDerby"]:hover{border-color:rgba(255,68,68,.5);background:rgba(255,68,68,.08);box-shadow:0 8px 24px rgba(255,68,68,.1)}

      /* Featured Team Mode button */
      .mode-btn-featured{width:92%;max-width:520px;margin:14px 0 0;padding:20px 0;border-color:rgba(255,215,0,.25);background:linear-gradient(135deg,rgba(255,215,0,.04),rgba(191,87,0,.08));position:relative;overflow:hidden}
      .mode-btn-featured::before{content:'\1F3D9';display:block;font-size:24px;margin-bottom:4px;opacity:.5;transition:all .3s}
      .mode-btn-featured::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#FFD700 50%,transparent);opacity:.3}
      .mode-btn-featured:hover{border-color:rgba(255,215,0,.5);box-shadow:0 8px 32px rgba(255,215,0,.1);transform:translateY(-2px)}
      .mode-btn-featured:hover::before{opacity:1;transform:scale(1.15)}

      /* Mode select entrance animations */
      @keyframes mode-title-enter{from{opacity:0;transform:translateY(-20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
      @keyframes mode-card-enter{from{opacity:0;transform:translateY(16px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
      .mode-title{animation:mode-title-enter .5s cubic-bezier(.4,0,.2,1) both}
      .mode-sub{animation:mode-title-enter .5s cubic-bezier(.4,0,.2,1) .1s both}
      .mode-grid .mode-btn:nth-child(1){animation:mode-card-enter .4s cubic-bezier(.4,0,.2,1) .2s both}
      .mode-grid .mode-btn:nth-child(2){animation:mode-card-enter .4s cubic-bezier(.4,0,.2,1) .3s both}
      .mode-grid .mode-btn:nth-child(3){animation:mode-card-enter .4s cubic-bezier(.4,0,.2,1) .4s both}
      .mode-btn-featured{animation:mode-card-enter .4s cubic-bezier(.4,0,.2,1) .5s both}

      /* Game Over Overlay */
      #game-over{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,26,.96) 0%,rgba(20,12,8,.94) 50%,rgba(10,10,26,.96) 100%);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;z-index:200;transition:opacity .4s;overflow-y:auto;padding:24px 16px}
      #game-over.hidden{opacity:0;pointer-events:none}

      /* Vignette border glow */
      #game-over::before{content:'';position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 120px 30px rgba(10,10,26,.8);z-index:0}

      /* Top gradient accent bar */
      #game-over::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#BF5700 20%,#FFD700 50%,#BF5700 80%,transparent);z-index:1}

      /* Glass card wrapper */
      .go-card{position:relative;z-index:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:28px 24px;max-width:420px;width:100%;margin:0 auto;backdrop-filter:blur(8px)}
      .go-card + .go-card{margin-top:12px}

      /* Title section */
      .go-header{text-align:center;margin-bottom:4px;position:relative;z-index:1}
      .go-title{font-size:44px;font-weight:800;color:#ff4444;margin-bottom:0;letter-spacing:-1px;text-shadow:0 0 40px rgba(255,68,68,.2);animation:go-title-enter .6s cubic-bezier(.34,1.56,.64,1) both}
      @keyframes go-title-enter{from{opacity:0;transform:scale(.8) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

      /* Performance rating bar */
      .go-rating{margin:12px 0 4px;position:relative;z-index:1}
      .go-rating-track{width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;position:relative}
      .go-rating-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.34,1.56,.64,1);width:0;position:relative}
      .go-rating-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(255,255,255,.3));border-radius:3px}
      .go-rating-labels{display:flex;justify-content:space-between;margin-top:4px}
      .go-rating-label{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:1px}
      .go-rating-value{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

      /* Stats grid — animated counters */
      .go-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;margin:16px 0;position:relative;z-index:1}
      .go-stat{text-align:center;padding:10px 8px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);transition:border-color .3s,background .3s}
      .go-stat.highlight{border-color:rgba(255,215,0,.2);background:rgba(255,215,0,.04)}
      .go-stat-val{font-size:32px;font-weight:700;color:#ffd700;line-height:1;margin-bottom:2px;font-variant-numeric:tabular-nums}
      .go-stat-label{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1.5px}
      .go-stat:nth-child(1){animation:go-stat-enter .5s .2s both}
      .go-stat:nth-child(2){animation:go-stat-enter .5s .3s both}
      .go-stat:nth-child(3){animation:go-stat-enter .5s .4s both}
      .go-stat:nth-child(4){animation:go-stat-enter .5s .5s both}
      @keyframes go-stat-enter{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

      /* Leaderboard */
      .go-lb{width:100%;max-height:160px;overflow-y:auto;position:relative;z-index:1}
      .go-lb-title{font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;text-align:center}
      .go-lb-row{display:flex;justify-content:space-between;padding:5px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.5);transition:background .2s}
      .go-lb-row:hover{background:rgba(255,255,255,.03)}
      .go-lb-row.you{color:#ffd700;font-weight:600;background:rgba(255,215,0,.04);border-left:2px solid #ffd700}

      /* Box Score Table (v2 — heat-encoded) */
      .go-box-score{position:relative;z-index:1}
      .go-box-score table{width:100%;border-collapse:collapse;font-size:11px;font-family:'Oswald',monospace}
      .go-box-score th{color:rgba(255,255,255,.3);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:4px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.08)}
      .go-box-score th:first-child{text-align:left}
      .go-box-score td{padding:5px 5px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03);color:rgba(255,255,255,.55);transition:background .3s,color .3s}
      .go-box-score td:first-child{text-align:left;color:rgba(255,255,255,.75);font-weight:600;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
      .go-box-score tr:last-child td{border-top:1px solid rgba(191,87,0,.25);font-weight:700;color:#ffd700}
      .go-box-score .bs-title{font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;text-align:center}
      /* Heat encoding classes */
      .go-box-score td.heat-hr{color:#ffd700;font-weight:700;text-shadow:0 0 8px rgba(255,215,0,.3)}
      .go-box-score td.heat-high{background:rgba(255,215,0,.08);color:#ffd700}
      .go-box-score td.heat-med{background:rgba(191,87,0,.06);color:rgba(255,180,80,.9)}
      .go-box-score td.heat-low{color:rgba(255,255,255,.3)}
      .go-box-score tr.mvp-row td:first-child{position:relative;padding-left:14px}
      .go-box-score tr.mvp-row td:first-child::before{content:'';position:absolute;left:2px;top:50%;transform:translateY(-50%);width:5px;height:5px;border-radius:50%;background:#ffd700;box-shadow:0 0 6px rgba(255,215,0,.5)}

      /* Personal best banner */
      .go-best-banner{font-size:14px;font-weight:700;color:#ffd700;text-align:center;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 16px rgba(255,215,0,.4);margin:-8px 0 8px;animation:best-pulse 1.5s ease-in-out infinite}
      @keyframes best-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.04)}}

      /* CRT arcade scanlines */
      #scanlines{position:absolute;inset:0;pointer-events:none;z-index:150;background:repeating-linear-gradient(0deg,rgba(0,0,0,.03) 0px,rgba(0,0,0,.03) 1px,transparent 1px,transparent 2px);mix-blend-mode:multiply}

      /* Sound toggle */
      #sound-toggle{position:absolute;top:12px;right:12px;z-index:180;width:40px;height:40px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(10,10,26,.6);backdrop-filter:blur(4px);color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1}
      #sound-toggle:hover{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
      #sound-toggle.muted{color:rgba(255,68,68,.6)}

      /* Menu button (exit to main menu during gameplay) */
      #menu-btn{position:absolute;top:12px;left:12px;z-index:180;height:32px;padding:0 12px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(10,10,26,.6);backdrop-filter:blur(4px);color:rgba(255,255,255,.4);font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:none;align-items:center;transition:all .2s;line-height:1}
      #menu-btn:hover{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
      #menu-btn.visible{display:flex}

      /* Pause Menu Overlay */
      #pause-menu{position:absolute;inset:0;background:rgba(10,10,26,.88);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:210;opacity:0;pointer-events:none;transition:opacity .25s}
      #pause-menu.active{opacity:1;pointer-events:auto}
      .pause-bsi-link{display:inline-block;margin-top:20px;font-family:'JetBrains Mono','Oswald',monospace;font-size:11px;color:#BF5700;text-decoration:none;letter-spacing:1.5px;text-transform:uppercase;transition:color .2s}
      .pause-bsi-link:hover{color:#FF6B35}
      .pause-title{font-family:'Oswald',sans-serif;font-size:48px;font-weight:800;color:#ffd700;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;text-shadow:0 2px 16px rgba(255,215,0,.15)}
      .pause-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;font-family:'Oswald',sans-serif}
      .pause-btn{font-family:'Oswald',sans-serif;width:220px;padding:14px 0;margin:6px 0;border:2px solid rgba(191,87,0,.35);border-radius:10px;background:rgba(191,87,0,.08);color:#ffd700;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);letter-spacing:.5px;text-transform:uppercase}
      .pause-btn:hover{background:rgba(255,215,0,.12);border-color:#ffd700;transform:translateY(-2px);box-shadow:0 8px 24px rgba(191,87,0,.15)}
      .pause-btn.pause-quit{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4);background:transparent}
      .pause-btn.pause-quit:hover{border-color:rgba(255,68,68,.4);color:rgba(255,68,68,.8);background:rgba(255,68,68,.06)}
      .pause-hint{margin-top:24px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:1.5px;text-transform:uppercase;font-family:'Oswald',sans-serif}

      /* Difficulty selector on mode select */
      .diff-row{display:flex;gap:8px;margin-top:16px;justify-content:center}
      .diff-btn{font-family:'Oswald',sans-serif;padding:8px 18px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px;background:transparent;color:rgba(255,255,255,.4);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:1px;text-transform:uppercase}
      .diff-btn:hover{border-color:rgba(255,215,0,.4);color:rgba(255,215,0,.7)}
      .diff-btn.active{border-color:#BF5700;color:#FFD700;background:rgba(191,87,0,.12);box-shadow:0 0 12px rgba(191,87,0,.1)}
      .diff-btn[data-diff="easy"]{--dc:rgba(85,187,255,.5)}
      .diff-btn[data-diff="easy"].active{border-color:rgba(85,187,255,.5);color:#55bbff;background:rgba(85,187,255,.08)}
      .diff-btn[data-diff="hard"]{--dc:rgba(255,68,68,.5)}
      .diff-btn[data-diff="hard"].active{border-color:rgba(255,68,68,.5);color:#ff4444;background:rgba(255,68,68,.08)}

      /* Back to hub link */
      #name-input:focus{border-color:#FFD700}
      #name-input::-moz-placeholder{color:rgba(255,215,0,.3)}
      #name-input::placeholder{color:rgba(255,215,0,.3)}
      #name-prompt.hidden{opacity:0;pointer-events:none}

      .mode-back{display:inline-block;margin-top:20px;color:rgba(255,255,255,.35);font-size:13px;font-family:'Oswald',sans-serif;text-decoration:none;letter-spacing:1px;text-transform:uppercase;transition:color .2s;cursor:pointer}
      .mode-back:hover{color:#ffd700}

      @media(max-width:600px){
        .mode-title,.loading-title{font-size:34px}
        .mode-sub{margin-bottom:28px;font-size:10px}
        .mode-btn{width:100%;max-width:300px;padding:14px 0;font-size:15px}
        .mode-grid{grid-template-columns:1fr;gap:10px;max-width:300px}
        .mode-grid .mode-btn{padding:16px 16px;font-size:15px;display:flex;align-items:center;gap:12px;text-align:left}
        .mode-grid .mode-btn::before{display:inline-block;font-size:22px;margin-bottom:0;min-width:28px;text-align:center}
        .mode-grid .mode-btn .mode-desc{margin-top:0;margin-left:auto;font-size:10px}
        .mode-btn-featured{max-width:300px;width:100%;padding:16px 0}
        .mode-btn-featured::before{display:inline;margin-right:8px;margin-bottom:0;font-size:18px}
        #mode-select{padding:20px 16px}
        #game-over{padding:16px 10px}
        .go-card{padding:20px 16px;border-radius:12px;max-width:100%}
        .go-title{font-size:32px}
        .go-stat-val{font-size:24px}
        .go-stats{gap:6px 16px}
        .go-stat{padding:8px 6px}
        .go-box-score table{font-size:10px}
        .go-box-score th{font-size:8px;padding:3px 3px}
        .go-box-score td{padding:4px 3px}
        .loading-progress{width:200px}
      }
    </style>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
      <div id="scanlines"></div>
      <button id="menu-btn" title="Back to Menu">&#x2190; MENU</button>
      <button id="sound-toggle" title="Toggle Sound">&#x1F50A;</button>

      <!-- Pause Menu -->
      <div id="pause-menu">
        <div class="pause-title">Paused</div>
        <div class="pause-sub">Take a breather</div>
        <button class="pause-btn" id="pause-resume">Resume</button>
        <button class="pause-btn pause-quit" id="pause-quit">Quit to Menu</button>
        <div class="pause-hint">Press ESC to resume</div>
        <a href="https://blazesportsintel.com" class="pause-bsi-link">&larr; blazesportsintel.com</a>
      </div>

      <div id="loading-screen">
        <div class="loading-title">Sandlot Sluggers</div>
        <div class="loading-subtitle">Blaze Sports Intel</div>
        <div class="loading-progress"><div class="loading-progress-fill" id="loading-fill"></div></div>
        <div class="loading-stage" id="loading-stage">Preparing field...</div>
        <div class="loading-spinner"></div>
      </div>

      <!-- Player name prompt -->
      <div id="name-prompt" class="hidden" style="position:absolute;inset:0;background:rgba(10,10,26,.95);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:250;transition:opacity .4s">
        <div style="font-size:24px;font-weight:700;color:#FFD700;margin-bottom:8px;letter-spacing:-.5px">What's your name?</div>
        <div style="font-size:12px;color:rgba(255,255,255,.35);margin-bottom:24px;letter-spacing:1px;text-transform:uppercase">For the leaderboard</div>
        <input id="name-input" type="text" maxlength="20" placeholder="Your name" style="font-family:'Oswald',sans-serif;width:260px;padding:12px 16px;border:2px solid rgba(191,87,0,.35);border-radius:10px;background:rgba(191,87,0,.08);color:#FFD700;font-size:17px;font-weight:600;text-align:center;outline:none;letter-spacing:.5px;transition:border-color .2s" />
        <button id="name-submit" class="mode-btn" style="margin-top:16px">Let's Play</button>
      </div>

      <div id="mode-select" class="hidden">
        <div class="mode-title">Sandlot Sluggers</div>
        <div class="mode-sub">Choose Your Mode</div>
        <div class="mode-grid">
          <button class="mode-btn" data-mode="practice">Practice<div class="mode-desc">Swing at unlimited pitches to dial in your timing and mechanics.</div></button>
          <button class="mode-btn" data-mode="quickPlay">Quick Play<div class="mode-desc">3-inning game against a college baseball roster. First team to score wins.</div></button>
          <button class="mode-btn" data-mode="hrDerby">HR Derby<div class="mode-desc">10 pitches, swing for the fences. Distance and exit velocity tracked.</div></button>
        </div>
        <button class="mode-btn mode-btn-featured" data-mode="teamMode" id="team-mode-btn">Team Mode<div class="mode-desc">Select a real D1 college baseball team and play with their actual roster stats.</div></button>
        <div class="diff-row" id="diff-row">
          <button class="diff-btn" data-diff="easy">Easy</button>
          <button class="diff-btn active" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
        <div id="career-stats" style="display:none;margin-top:20px;text-align:center;max-width:480px;width:90%">
          <div style="font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Your Career</div>
          <div id="career-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px"></div>
        </div>
        <a href="/" class="mode-back" id="back-to-hub">&larr; Arcade Hub</a>
      </div>

      <!-- Team select overlay (v2) -->
      <div id="team-select-container"></div>

      <div id="game-over" class="hidden">
        <!-- Results card -->
        <div class="go-card" id="go-results-card">
          <div class="go-header">
            <img id="go-team-logo" style="display:none;width:40px;height:40px;object-fit:contain;margin-bottom:6px" alt="">
            <div class="go-title">GAME OVER</div>
            <div id="go-team-name" style="display:none;font-size:13px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:2px;margin-top:2px"></div>
          </div>
          <!-- Performance rating bar -->
          <div class="go-rating" id="go-rating" style="display:none">
            <div class="go-rating-track"><div class="go-rating-fill" id="go-rating-fill"></div></div>
            <div class="go-rating-labels"><span class="go-rating-label">Performance</span><span class="go-rating-value" id="go-rating-value"></span></div>
          </div>
          <div class="go-best-banner" style="display:none"></div>
          <div class="go-stats" id="go-stats"></div>
        </div>

        <!-- Box score card (team mode) -->
        <div class="go-card go-box-score" id="go-box-score" style="display:none;max-width:420px;width:100%;overflow-x:auto"></div>

        <!-- Leaderboard card -->
        <div class="go-card" id="go-lb-card" style="display:none">
          <div class="go-lb" id="go-leaderboard"></div>
        </div>

        <!-- Actions card -->
        <div class="go-card" style="padding:16px 20px;display:flex;flex-direction:column;gap:8px;max-width:420px;width:100%">
          <div style="display:flex;gap:8px">
            <button class="mode-btn" id="go-restart" style="flex:1;margin:0">Play Again</button>
            <button class="mode-btn" id="go-share" style="flex:0 0 auto;width:auto;padding:16px 24px;border-color:rgba(255,215,0,.4);color:#ffd700;margin:0">Share</button>
          </div>
          <button class="mode-btn" id="go-menu" style="border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.4);background:transparent;width:100%;margin:0">Main Menu</button>
        </div>
      </div>
    </div>

    <noscript><p style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">Sandlot Sluggers requires JavaScript.</p></noscript>
  </body>
</html>
