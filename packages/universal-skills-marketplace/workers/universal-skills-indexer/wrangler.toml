name = "universal-skills-indexer"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 */6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "universal-skills"
database_id = "PLACEHOLDER_RUN_wrangler_d1_create"

[[r2_buckets]]
binding = "CONTENT"
bucket_name = "universal-skills-content"

[[kv_namespaces]]
binding = "INDEXER_STATE"
id = "PLACEHOLDER_RUN_wrangler_kv_namespace_create_INDEXER_STATE"

[observability]
enabled = true

# No routes — internal only, cron-driven
# Secret: GITHUB_TOKEN via `wrangler secret put GITHUB_TOKEN`
